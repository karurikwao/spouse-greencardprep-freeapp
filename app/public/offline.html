<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>Offline | Spouse Interview</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(520px, 100%);
        border: 1px solid #dbeafe;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        padding: 28px;
      }

      .mark {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: #dbeafe;
        color: #1d4ed8;
        font-size: 28px;
        font-weight: 900;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #475569;
        font-size: 15px;
        line-height: 1.7;
        font-weight: 600;
      }

      a {
        margin-top: 22px;
        display: inline-flex;
        border-radius: 10px;
        background: #0f172a;
        color: #ffffff;
        padding: 12px 16px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">S</div>
      <h1>You are offline</h1>
      <p>
        Spouse Interview cannot reach the network right now. Reconnect and reopen the app to continue Robin,
        dashboard messages, PDFs, and account features.
      </p>
      <a href="/">Try Again</a>
    </main>
  </body>
</html>
